# Reference file-based LiveKit config.
# The bundled docker-compose.yml injects the active LiveKit config through
# LIVEKIT_CONFIG so its keys stay aligned with Haven's .env values.

port: 7880
log_level: info

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: false

redis:
  address: redis:6379

keys:
  devkey: secret

room:
  auto_create: true